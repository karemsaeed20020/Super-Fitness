<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<head>

  <title>Super Fitness</title>
  <!-- to detect theme and locale to prevent flash on reload -->
  <script>
    const theme = localStorage.getItem('fitness_theme') ?? 'light';
    document.documentElement.classList.add(theme);

    const locale = localStorage.getItem('fitness_locale') ?? 'en';
    document.documentElement.lang = locale;
    document.documentElement.dir = locale === 'ar' ? 'rtl' : 'ltr';
  </script>
</head>

<body class="dark:bg-zinc-800 [@media(min-width:1920px)]:container [@media(min-width:1920px)]:mx-auto">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
